# cbindgen config for the Anki iOS C-ABI bridge.
# Generates include/anki_bridge.h from the #[no_mangle] extern "C" functions.

language = "C"
include_guard = "ANKI_BRIDGE_H"
pragma_once = false
autogen_warning = "/* Auto-generated by cbindgen. Do not edit by hand. */"
include_version = false
cpp_compat = true
documentation = true
documentation_style = "doxy"

[export]
prefix = ""

[defines]

[parse]
parse_deps = false
